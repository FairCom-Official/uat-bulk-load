services:
  faircom-edge:
    image: ${FAIRCOM_IMAGE:-faircomteam/edge:latest}
    container_name: bulkload-faircom
    restart: unless-stopped
    ports:
      - "${FAIRCOM_HTTP_PORT:-8080}:8080"   # HTTP (REST / JSON Action API)
      - "6597:6597"                          # FairCom SQL/ISAM
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11.8}
    container_name: bulkload-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-benchmark}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-benchmark}
    # secure-file-priv pins the directory that server-side LOAD DATA INFILE may
    # read from; we mount ./data there read-only.
    command: ["--secure-file-priv=/data", "--local-infile=1"]
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - ./data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized || mariadb-admin ping -h localhost -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
